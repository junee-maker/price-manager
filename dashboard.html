<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디지털존 매출/주문 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:13px}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:#fff;border-radius:14px;padding:48px 40px;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,.07);min-width:300px}
.login-card h1{font-size:19px;font-weight:600;margin-bottom:6px}
.login-card p{font-size:13px;color:#6b7280;margin-bottom:28px}
.google-btn{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:11px 18px;font-size:13px;font-weight:500;color:#374151;cursor:pointer;width:100%;justify-content:center}
.google-btn:hover{background:#f9fafb}
.google-btn svg{width:18px;height:18px;flex-shrink:0}
#app{display:none;flex-direction:column;min-height:100vh}
header{flex-shrink:0;background:#fff;border-bottom:1px solid #e8eaed;padding:0 20px;height:50px;display:flex;align-items:center;gap:10px}
.logo{font-size:14px;font-weight:600}.logo span{color:#4359FF}
.hdr-link{font-size:11px;color:#4359FF;text-decoration:none;border:1px solid #c7d2fe;border-radius:5px;padding:3px 10px}
.hdr-link:hover{background:#eef2ff}
.hdr-space{flex:1}
.save-badge{font-size:11px;color:#16a34a;opacity:0;transition:opacity .4s}
.save-badge.show{opacity:1}
.user-info{display:flex;align-items:center;gap:8px;font-size:12px;color:#343a40}
.avatar{width:26px;height:26px;border-radius:50%;background:#4359FF;color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center}
.logout-btn{font-size:11px;color:#374151;background:none;border:1px solid #d1d5db;border-radius:5px;padding:3px 9px;cursor:pointer}
main{padding:16px 20px;max-width:1400px;margin:0 auto;width:100%}
.filter-bar{background:#fff;border:1px solid #e0e3e8;border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-bar label{font-size:11px;color:#4b5563;font-weight:500;white-space:nowrap}
.f-sel,.f-inp{padding:5px 9px;border:1px solid #d1d5db;border-radius:6px;font-size:12px;font-family:inherit;outline:none;color:#1a1a2e;background:#fff}
.f-sel:focus,.f-inp:focus{border-color:#4359FF}
.f-grp{display:flex;align-items:center;gap:5px}
.f-div{width:1px;height:18px;background:#e5e7eb;margin:0 2px}
.btn{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid #d1d5db;background:#fff;cursor:pointer;color:#1a1a2e;font-family:inherit;white-space:nowrap}
.btn:hover{background:#f4f5f7}
.btn-primary{background:#4359FF;color:#fff;border-color:#4359FF}
.btn-primary:hover{background:#3448e0}
.btn-up{border-color:#7c3aed;color:#7c3aed}
.btn-up:hover{background:#f5f3ff}
.btn-del{color:#dc2626;border-color:#fca5a5}
.btn-del:hover{background:#fef2f2}
.btn-reset{color:#9ca3af;border-color:#e5e7eb}
.btn-reset:hover{color:#dc2626;background:#fef2f2}
/* 전체요약 */
.summary-wrap{background:linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%);border-radius:14px;padding:20px;margin-bottom:14px}
.summary-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.6);letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px}
.s-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:10px;margin-bottom:14px}
.s-card{background:rgba(255,255,255,.13);border-radius:10px;padding:12px 14px}
.s-card-label{font-size:10px;color:rgba(255,255,255,.6);margin-bottom:5px;font-weight:500}
.s-card-value{font-size:17px;font-weight:700;color:#fff}
.s-chart{background:rgba(255,255,255,.09);border-radius:10px;padding:14px}
.s-chart-title{font-size:10px;color:rgba(255,255,255,.55);margin-bottom:10px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.s-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.s-bar-row:last-child{margin-bottom:0}
.s-bar-label{width:56px;font-size:11px;color:rgba(255,255,255,.75);flex-shrink:0}
.s-bar-track{flex:1;background:rgba(255,255,255,.15);border-radius:4px;height:16px;overflow:hidden}
.s-bar-fill{height:100%;border-radius:4px}
.s-bar-val{width:120px;text-align:right;font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
/* 세부 탭 */
.detail-wrap{background:#fff;border:1px solid #e0e3e8;border-radius:14px;overflow:hidden}
.detail-tabbar{display:flex;align-items:stretch;border-bottom:2px solid #e5e7eb;background:#f9fafb}
.d-tab{display:flex;align-items:center;gap:8px;padding:0 22px;height:48px;font-size:13px;font-weight:600;color:#6b7280;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.d-tab:hover{color:#1a1a2e;background:#f0f0f0}
.d-tab.active{color:#4359FF;border-bottom-color:#4359FF;background:#fff}
.d-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.badge-own{background:#dbeafe;color:#1d4ed8}
.badge-biz{background:#dcfce7;color:#15803d}
.d-cnt{font-size:10px;color:#9ca3af;font-weight:400}
.d-actions{flex:1;display:flex;align-items:center;justify-content:flex-end;gap:6px;padding:0 14px}
.d-pane{display:none;padding:16px}
.d-pane.active{display:block}
/* 서브 카드 */
.sub-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.sub-card{background:#f8f9fa;border-radius:8px;padding:10px 12px;border:1px solid #eee}
.sub-card-label{font-size:10px;color:#6b7280;margin-bottom:4px;font-weight:500}
.sub-card-value{font-size:16px;font-weight:700;color:#1a1a2e}
.sc-blue .sub-card-value{color:#2563eb}
.sc-green .sub-card-value{color:#16a34a}
.sc-red .sub-card-value{color:#dc2626}
.sc-purple .sub-card-value{color:#7c3aed}
/* 미니 차트 */
.mini-chart-wrap{margin-bottom:12px}
.mc-title{font-size:11px;color:#4b5563;margin-bottom:6px;font-weight:600}
.bar-chart{display:flex;flex-direction:column;gap:4px}
.bar-row{display:flex;align-items:center;gap:6px}
.bar-label{width:90px;font-size:10px;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.bar-track{flex:1;background:#f3f4f6;border-radius:4px;height:14px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.bar-val{width:80px;text-align:right;font-size:10px;color:#374151;flex-shrink:0}
/* 내부 탭 */
.i-tabs{display:flex;gap:2px;border-bottom:2px solid #e5e7eb;margin-bottom:10px}
.i-tab{padding:7px 12px;font-size:12px;font-weight:500;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.i-tab:hover{color:#1a1a2e}
.i-tab.active{color:#4359FF;border-bottom-color:#4359FF}
/* 테이블 */
.table-wrap{overflow-x:auto;border:1px solid #e0e3e8;border-radius:9px}
.table-wrap table{border-collapse:collapse;width:100%;min-width:500px}
.table-wrap thead th{position:sticky;top:0;background:#f8f9fa;font-weight:600;font-size:11px;color:#343a40;padding:8px 10px;border-bottom:2px solid #dee2e6;border-right:1px solid #e9ecef;text-align:center;white-space:nowrap}
.table-wrap thead th:last-child{border-right:none}
.table-wrap tbody td{padding:7px 10px;border-bottom:1px solid #f0f0f0;border-right:1px solid #f4f4f4;font-size:12px;color:#1a1a2e;white-space:nowrap}
.table-wrap tbody td:last-child{border-right:none}
.table-wrap tbody tr:nth-child(even) td{background:#fafafa}
.table-wrap tbody tr:hover td{background:#f0f4ff!important}
.raw-wrap{overflow:auto;border:1px solid #e0e3e8;border-radius:9px;max-height:380px}
.raw-wrap table{min-width:1400px;border-collapse:collapse;width:100%}
.raw-wrap thead th{position:sticky;top:0;background:#f8f9fa;font-weight:600;font-size:11px;color:#343a40;padding:8px 10px;border-bottom:2px solid #dee2e6;border-right:1px solid #e9ecef;text-align:center;white-space:nowrap}
.raw-wrap tbody td{padding:7px 10px;border-bottom:1px solid #f0f0f0;border-right:1px solid #f4f4f4;font-size:12px;color:#1a1a2e;white-space:nowrap}
.raw-wrap tbody tr:nth-child(even) td{background:#fafafa}
.td-r{text-align:right}.td-c{text-align:center}
.vp{color:#16a34a;font-weight:600}.vn{color:#dc2626;font-weight:600}
.empty{text-align:center;padding:36px;color:#9ca3af;font-size:13px}
/* 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:flex-start;justify-content:center;padding-top:80px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px 26px;width:520px;max-width:96vw;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:6px;color:#1a1a2e}
.modal-desc{font-size:11px;color:#4b5563;line-height:1.7;margin-bottom:10px;background:#f8f9fa;padding:10px 12px;border-radius:6px}
.modal-desc code{background:#e9ecef;padding:1px 4px;border-radius:3px;font-size:10px}
.modal textarea{width:100%;height:120px;font-size:11px;font-family:monospace;padding:8px;border-radius:6px;border:1px solid #d1d5db;resize:vertical;outline:none;color:#1a1a2e}
.modal textarea:focus{border-color:#4359FF}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid #f3f4f6}
#loading{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;font-size:13px;color:#374151}
.spinner{width:26px;height:26px;border:3px solid #e5e7eb;border-top-color:#4359FF;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;font-size:12px;padding:8px 18px;border-radius:8px;display:none;z-index:999}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span>불러오는 중...</span></div>
<div id="toast"></div>

<div id="loginScreen">
  <div class="login-card">
    <h1>디지털존 대시보드</h1>
    <p>구글 계정으로 로그인하여 사용하세요</p>
    <button class="google-btn" onclick="DB.signIn()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google로 로그인
    </button>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">디지털존 <span>대시보드</span></div>
    <a href="./index.html" class="hdr-link">← 단가관리</a>
    <div class="hdr-space"></div>
    <span class="save-badge" id="saveBadge">저장됨 ✓</span>
    <div class="user-info">
      <div class="avatar" id="avatarInitial">?</div>
      <span id="userEmail"></span>
      <button class="logout-btn" onclick="DB.signOut()">로그아웃</button>
    </div>
  </header>

  <main>
    <div class="filter-bar">
      <div class="f-grp"><label>기간단위</label>
        <select class="f-sel" id="fPeriod" onchange="DB.render()">
          <option value="all">전체</option><option value="year">연도별</option>
          <option value="month" selected>월별</option><option value="week">주별</option><option value="day">일별</option>
        </select>
      </div>
      <div class="f-grp"><label>연도</label><select class="f-sel" id="fYear" onchange="DB.render()"><option value="">전체</option></select></div>
      <div class="f-grp"><label>월</label>
        <select class="f-sel" id="fMonth" onchange="DB.render()">
          <option value="">전체</option><option>1</option><option>2</option><option>3</option><option>4</option>
          <option>5</option><option>6</option><option>7</option><option>8</option>
          <option>9</option><option>10</option><option>11</option><option>12</option>
        </select>
      </div>
      <div class="f-div"></div>
      <div class="f-grp"><label>거래처</label><select class="f-sel" id="fVendor" onchange="DB.render()"><option value="">전체</option></select></div>
      <div class="f-grp"><label>제품명</label><input class="f-inp" id="fProduct" placeholder="검색..." oninput="DB.render()" style="width:140px"></div>
      <button class="btn btn-reset" onclick="DB.resetFilters()">초기화</button>
    </div>

    <div class="summary-wrap">
      <div class="summary-label">전체 요약</div>
      <div class="s-cards" id="totalCards"></div>
      <div class="s-chart" id="totalChart"></div>
    </div>

    <div class="detail-wrap">
      <div class="detail-tabbar">
        <div class="d-tab active" id="dtab-own" onclick="DB.switchDetail('own')">
          <span class="d-badge badge-own">자체소싱</span>
          <span class="d-cnt" id="ownCount">0건</span>
        </div>
        <div class="d-tab" id="dtab-biz" onclick="DB.switchDetail('biz')">
          <span class="d-badge badge-biz">사업부</span>
          <span class="d-cnt" id="bizCount">0건</span>
        </div>
        <div class="d-actions" id="dActions"></div>
      </div>
      <div class="d-pane active" id="dpane-own">
        <div class="sub-cards" id="ownCards"></div>
        <div class="mini-chart-wrap" id="ownChart"></div>
        <div class="i-tabs">
          <div class="i-tab active" onclick="DB.switchTab('own','summary',this)">기간별</div>
          <div class="i-tab" onclick="DB.switchTab('own','vendor',this)">거래처별</div>
          <div class="i-tab" onclick="DB.switchTab('own','product',this)">제품별</div>
          <div class="i-tab" onclick="DB.switchTab('own','raw',this)">원본 데이터</div>
        </div>
        <div id="ownTable"></div>
      </div>
      <div class="d-pane" id="dpane-biz">
        <div class="sub-cards" id="bizCards"></div>
        <div class="mini-chart-wrap" id="bizChart"></div>
        <div class="i-tabs">
          <div class="i-tab active" onclick="DB.switchTab('biz','summary',this)">기간별</div>
          <div class="i-tab" onclick="DB.switchTab('biz','dept',this)">부서별</div>
          <div class="i-tab" onclick="DB.switchTab('biz','product',this)">제품별</div>
          <div class="i-tab" onclick="DB.switchTab('biz','raw',this)">원본 데이터</div>
        </div>
        <div id="bizTable"></div>
      </div>
    </div>
  </main>
</div>

<div class="modal-bg" id="pasteModal" onclick="DB.bgClick(event)">
  <div class="modal">
    <h3 id="pasteTitle">데이터 붙여넣기</h3>
    <div class="modal-desc" id="pasteDesc"></div>
    <textarea id="pasteArea" placeholder="엑셀에서 복사(Ctrl+C) 후 여기에 붙여넣기(Ctrl+V)..."></textarea>
    <div class="modal-footer">
      <button class="btn" onclick="DB.closePaste()">취소</button>
      <button class="btn btn-primary" onclick="DB.doPaste()">가져오기</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc }
  from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
const cfg={apiKey:"AIzaSyCbjHxYjPKd5HqSylP5lvls1GHdcylK1XU",authDomain:"authentication-7ee4e.firebaseapp.com",projectId:"authentication-7ee4e",storageBucket:"authentication-7ee4e.firebasestorage.app",messagingSenderId:"349583834213",appId:"1:349583834213:web:9c2bf9251a87f1ef3ada8c"};
const ALLOWED=["emtlstodn@gmail.com","ynkim@gws.daoudata.co.kr"];
const fbApp=initializeApp(cfg), auth=getAuth(fbApp), db=getFirestore(fbApp);
window._dbfb={
  signIn:()=>signInWithPopup(auth,new GoogleAuthProvider()),
  signOut:()=>fbSignOut(auth),
  load:async()=>{const s=await getDoc(doc(db,"dashData","dashboard-shared"));return s.exists()?s.data():null;},
  save:(data)=>setDoc(doc(db,"dashData","dashboard-shared"),data)
};
const TO=setTimeout(()=>{document.getElementById("loading").innerHTML='<p style="color:#dc2626">로드 실패. 새로고침 해주세요.</p>';},8000);
onAuthStateChanged(auth,async user=>{
  clearTimeout(TO);
  document.getElementById("loading").style.display="none";
  if(!user){document.getElementById("loginScreen").style.display="flex";return;}
  if(!ALLOWED.includes(user.email)){alert("접근 권한이 없습니다.");await fbSignOut(auth);document.getElementById("loginScreen").style.display="flex";return;}
  document.getElementById("avatarInitial").textContent=user.email[0].toUpperCase();
  document.getElementById("userEmail").textContent=user.email;
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("app").style.display="flex";
  try{
    const d=await window._dbfb.load();
    if(d){
      function restore(rows){
        return(rows||[]).map(function(r){
          var o=Object.assign({},r);
          if(o.orderDate&&typeof o.orderDate==="string") o.orderDate=new Date(o.orderDate);
          else if(o.orderDate&&o.orderDate.seconds) o.orderDate=new Date(o.orderDate.seconds*1000);
          if(!(o.orderDate instanceof Date)||isNaN(o.orderDate)) o.orderDate=null;
          return o;
        });
      }
      DB.ownRows=restore(d.ownRows); DB.bizRows=restore(d.bizRows);
    }
  }catch(e){console.error(e);}
  DB.buildYearFilter(); DB.buildVendorFilter();
  DB.switchDetail("own"); DB.render();
});
</script>

<script>
var DB={
  ownRows:[],bizRows:[],ownTab:"summary",bizTab:"summary",_detailTab:"own",_pt:null,

  signIn:function(){window._dbfb&&window._dbfb.signIn().catch(function(e){DB.toast("로그인 실패: "+e.message);});},
  signOut:function(){window._dbfb&&window._dbfb.signOut().then(function(){location.reload();});},

  save:function(){
    if(!window._dbfb)return;
    function ser(rows){return rows.map(function(r){var o=Object.assign({},r);if(o.orderDate instanceof Date)o.orderDate=o.orderDate.toISOString();return o;});}
    window._dbfb.save({ownRows:ser(DB.ownRows),bizRows:ser(DB.bizRows),updatedAt:new Date().toISOString()})
      .then(function(){DB.flash("saveBadge");}).catch(function(e){DB.toast("저장 실패: "+e.message);});
  },

  switchDetail:function(tab){
    DB._detailTab=tab;
    ["own","biz"].forEach(function(t){
      var dt=document.getElementById("dtab-"+t),dp=document.getElementById("dpane-"+t);
      if(dt)dt.classList.toggle("active",t===tab);
      if(dp)dp.classList.toggle("active",t===tab);
    });
    var a=document.getElementById("dActions");
    if(a) a.innerHTML=
      '<button class="btn btn-up" onclick="DB.openPaste(\''+tab+'\')" style="padding:4px 9px">붙여넣기</button>'+
      (tab==="own"
        ?'<button class="btn btn-del" onclick="DB.clearOwn()" style="padding:4px 7px">초기화</button>'
        :'<button class="btn btn-del" onclick="DB.clearBiz()" style="padding:4px 7px">초기화</button>');
  },

  openPaste:function(t){
    DB._pt=t;

  doPaste:function(){
    var raw=document.getElementById("pasteArea").value.trim();
    if(!raw){DB.toast("데이터를 붙여넣어주세요");return;}
    function parseTSV(text){
      var rows=[],row=[],cell="",inQ=false;
      for(var i=0;i<text.length;i++){
        var c=text.charCodeAt(i),ch=text[i];
        if(inQ){if(c===34){if(text.charCodeAt(i+1)===34){cell+=ch;i++;}else inQ=false;}else cell+=ch;}
        else{if(c===34)inQ=true;else if(c===9){row.push(cell.trim());cell="";}
        else if(c===10){row.push(cell.trim());cell="";if(row.some(function(x){return x.length>0;}))rows.push(row);row=[];}
        else if(c!==13)cell+=ch;}
      }
      if(cell.trim()||row.length){row.push(cell.trim());if(row.some(function(x){return x.length>0;}))rows.push(row);}
      return rows;
    }
    var parsed=parseTSV(raw);
    if(!parsed.length){DB.toast("데이터를 인식할 수 없습니다");return;}
    var hdrs=parsed[0];
    var hasH=hdrs.some(function(h){return /주문일자|거래처|부서/.test(h);});
    var data=hasH?parsed.slice(1):parsed;
    function mCols(names){var m={};names.forEach(function(n){m[n]=-1;});hdrs.forEach(function(h,i){var t=(h||"").trim();names.forEach(function(n){if(t===n||t.indexOf(n)>=0)m[n]=i;});});return m;}
    function gv(r,m,n,di){var idx=m?m[n]:di;return(idx>=0&&idx<r.length)?r[idx]:"";}
    function pn(v){if(v===""||v===null||v===undefined)return 0;var n=parseFloat((v+"").replace(/,/g,"").replace(/%/g,""));return isNaN(n)?0:n;}

    if(DB._pt==="own"){
      var m=hasH?mCols(["거래처","주문일자","주문번호","고객명","제품명","수량","매입단가","매입가(총액)","판매단가","판매가(총액)","이익","이익률","결제방식","수수료","실이익","실이익률","회원 유형"]):null;
      var rows=data.map(function(r){return{vendor:gv(r,m,"거래처",0),orderDate:DB.pDate(gv(r,m,"주문일자",1)),orderNo:gv(r,m,"주문번호",4),customer:gv(r,m,"고객명",5),product:gv(r,m,"제품명",6),qty:pn(gv(r,m,"수량",7)),buyUnit:pn(gv(r,m,"매입단가",8)),buyTotal:pn(gv(r,m,"매입가(총액)",9)),sellUnit:pn(gv(r,m,"판매단가",10)),sellTotal:pn(gv(r,m,"판매가(총액)",11)),profit:pn(gv(r,m,"이익",12)),profitRate:pn(gv(r,m,"이익률",13)),payType:gv(r,m,"결제방식",14),fee:pn(gv(r,m,"수수료",15)),netProfit:pn(gv(r,m,"실이익",16)),netRate:pn(gv(r,m,"실이익률",17)),memberType:gv(r,m,"회원 유형",18)};}).filter(function(r){return r.orderDate&&r.product;});
      DB.ownRows=rows;DB.buildYearFilter();DB.buildVendorFilter();DB.render();DB.save();DB.toast("자체소싱 "+rows.length+"건 추가됨");
    }else{
      var m=hasH?mCols(["부서","주문일자","회사명","회원유형","주문번호","제품명","수량","판매단가","판매가(총액)","결제방식","수수료","비고"]):null;
      var rows=data.map(function(r){return{dept:gv(r,m,"부서",0),orderDate:DB.pDate(gv(r,m,"주문일자",1)),company:gv(r,m,"회사명",2),memberType:gv(r,m,"회원유형",3),orderNo:gv(r,m,"주문번호",4),product:gv(r,m,"제품명",5),qty:pn(gv(r,m,"수량",6)),sellUnit:pn(gv(r,m,"판매단가",7)),sellTotal:pn(gv(r,m,"판매가(총액)",8)),payType:gv(r,m,"결제방식",9),fee:pn(gv(r,m,"수수료",10)),note:gv(r,m,"비고",11)};}).filter(function(r){return r.orderDate&&r.product;});
      DB.bizRows=rows;DB.buildYearFilter();DB.render();DB.save();DB.toast("사업부 "+rows.length+"건 추가됨");
    }
    DB.closePaste();
  },

  pDate:function(v){
    if(!v)return null;
    if(v instanceof Date)return isNaN(v)?null:v;
    if(v&&v.seconds)return new Date(v.seconds*1000);
    if(typeof v==="string"){var d=new Date(v.replace(/\./g,"-").replace(/년|월/g,"-").replace(/일/g,"").trim());return isNaN(d)?null:d;}
    if(typeof v==="number"){var d=new Date((v-25569)*86400*1000);return isNaN(d)?null:d;}
    return null;
  },

  clearOwn:function(){if(!confirm("자체소싱 데이터를 초기화할까요?"))return;DB.ownRows=[];DB.render();DB.save();},
  clearBiz:function(){if(!confirm("사업부 데이터를 초기화할까요?"))return;DB.bizRows=[];DB.render();DB.save();},

  getF:function(){return{period:document.getElementById("fPeriod").value,year:document.getElementById("fYear").value,month:document.getElementById("fMonth").value,vendor:document.getElementById("fVendor").value,product:document.getElementById("fProduct").value.toLowerCase().trim()};},
  filterR:function(rows,f){return rows.filter(function(r){var d=r.orderDate;if(!d)return false;if(f.year&&d.getFullYear()!==+f.year)return false;if(f.month&&(d.getMonth()+1)!==+f.month)return false;if(f.vendor&&r.vendor!==f.vendor)return false;if(f.product&&(r.product||"").toLowerCase().indexOf(f.product)<0)return false;return true;});},
  resetFilters:function(){["fYear","fMonth","fVendor"].forEach(function(id){document.getElementById(id).value="";});document.getElementById("fPeriod").value="month";document.getElementById("fProduct").value="";DB.render();},
  buildYearFilter:function(){var ys={};DB.ownRows.concat(DB.bizRows).forEach(function(r){if(r.orderDate)ys[r.orderDate.getFullYear()]=1;});var sel=document.getElementById("fYear"),cur=sel.value;sel.innerHTML='<option value="">전체</option>'+Object.keys(ys).sort().reverse().map(function(y){return'<option value="'+y+'"'+(y==cur?' selected':'')+'>'+y+'년</option>';}).join("");},
  buildVendorFilter:function(){var vs={};DB.ownRows.forEach(function(r){if(r.vendor)vs[r.vendor]=1;});var sel=document.getElementById("fVendor"),cur=sel.value;sel.innerHTML='<option value="">전체</option>'+Object.keys(vs).sort().map(function(v){return'<option value="'+v+'"'+(v===cur?' selected':'')+'>'+v+'</option>';}).join("");},

  sumOwn:function(rows){var s={sellTotal:0,buyTotal:0,profit:0,netProfit:0,nos:{}};rows.forEach(function(r){s.sellTotal+=r.sellTotal;s.buyTotal+=r.buyTotal;s.profit+=r.profit;s.netProfit+=r.netProfit;if(r.orderNo)s.nos[r.orderNo]=1;});s.orders=Object.keys(s.nos).length;return s;},
  sumBiz:function(rows){var s={sellTotal:0,fee:0,nos:{}};rows.forEach(function(r){s.sellTotal+=r.sellTotal;s.fee+=r.fee;if(r.orderNo)s.nos[r.orderNo]=1;});s.orders=Object.keys(s.nos).length;return s;},
  pKey:function(d,p){if(!d)return"-";var y=d.getFullYear(),m=d.getMonth()+1,dd=d.getDate();if(p==="year")return y+"년";if(p==="month")return y+"년 "+m+"월";if(p==="week"){var j=new Date(y,0,1),w=Math.ceil(((d-j)/86400000+j.getDay()+1)/7);return y+"년 "+w+"주";}if(p==="day")return y+"-"+(m<10?"0":"")+m+"-"+(dd<10?"0":"")+dd;return"전체";},

  render:function(){
    var f=DB.getF(),ownF=DB.filterR(DB.ownRows,f),bizF=DB.filterR(DB.bizRows,f);
    var os=DB.sumOwn(ownF),bs=DB.sumBiz(bizF),total=os.sellTotal+bs.sellTotal;
    document.getElementById("ownCount").textContent=DB.ownRows.length+"건";
    document.getElementById("bizCount").textContent=DB.bizRows.length+"건";
    var sc=function(l,v){var val=typeof v==="number"?v.toLocaleString("ko-KR")+"원":v;return'<div class="s-card"><div class="s-card-label">'+l+'</div><div class="s-card-value">'+val+'</div></div>';};
    document.getElementById("totalCards").innerHTML=sc("전체 매출",total)+sc("자체소싱 매출",os.sellTotal)+sc("사업부 매출",bs.sellTotal)+sc("자체소싱 이익",os.profit)+sc("자체소싱 실이익",os.netProfit)+sc("전체 주문건수",(os.orders+bs.orders)+"건");
    var op=total>0?Math.round(os.sellTotal/total*100):0,bp=100-op;
    var fm=function(v){return v.toLocaleString("ko-KR")+"원";};
    document.getElementById("totalChart").innerHTML='<div class="s-chart-title">매출 구성비</div><div class="s-bar-row"><div class="s-bar-label">자체소싱</div><div class="s-bar-track"><div class="s-bar-fill" style="width:'+op+'%;background:#60a5fa"></div></div><div class="s-bar-val">'+fm(os.sellTotal)+' ('+op+'%)</div></div><div class="s-bar-row"><div class="s-bar-label">사업부</div><div class="s-bar-track"><div class="s-bar-fill" style="width:'+bp+'%;background:#34d399"></div></div><div class="s-bar-val">'+fm(bs.sellTotal)+' ('+bp+'%)</div></div>';
    var oc=function(l,v,cls){var val=typeof v==="number"?v.toLocaleString("ko-KR")+"원":v;return'<div class="sub-card '+cls+'"><div class="sub-card-label">'+l+'</div><div class="sub-card-value">'+val+'</div></div>';};
    document.getElementById("ownCards").innerHTML=oc("매출",os.sellTotal,"sc-blue")+oc("매입",os.buyTotal,"")+oc("이익",os.profit,"sc-green")+oc("실이익",os.netProfit,os.netProfit<0?"sc-red":"sc-green")+oc("주문건수",os.orders+"건","sc-purple")+oc("이익률",os.sellTotal>0?((os.profit/os.sellTotal)*100).toFixed(1)+"%":"-","");
    document.getElementById("bizCards").innerHTML=oc("매출",bs.sellTotal,"sc-blue")+oc("수수료",bs.fee,"")+oc("주문건수",bs.orders+"건","sc-purple");
    DB.miniChart("ownChart",ownF,"vendor","거래처별 매출 Top5","#3b82f6");
    DB.miniChart("bizChart",bizF,"dept","부서별 매출 Top5","#10b981");
    DB.renderOwnTable(ownF,f); DB.renderBizTable(bizF,f);
  },

  miniChart:function(elId,rows,key,title,color){
    var el=document.getElementById(elId);if(!el)return;
    if(!rows.length){el.innerHTML="";return;}
    var map={};rows.forEach(function(r){var k=r[key]||"기타";map[k]=(map[k]||0)+r.sellTotal;});
    var items=Object.keys(map).map(function(k){return{k:k,v:map[k]};}).sort(function(a,b){return b.v-a.v;}).slice(0,5);
    var maxV=items.length?items[0].v:1;
    var fmt=function(v){return v>=1000000?(v/1000000).toFixed(1)+"M":v>=1000?(v/1000).toFixed(0)+"K":v+"";};
    el.innerHTML='<div class="mc-title">'+title+'</div><div class="bar-chart">'+items.map(function(it){var p=maxV>0?Math.round(it.v/maxV*100):0;return'<div class="bar-row"><div class="bar-label" title="'+it.k+'">'+it.k+'</div><div class="bar-track"><div class="bar-fill" style="width:'+p+'%;background:'+color+'"></div></div><div class="bar-val">'+fmt(it.v)+'</div></div>';}).join("")+'</div>';
  },

  switchTab:function(section,tab,el){
    var p=section==="own"?"own":"biz";
    el.parentElement.querySelectorAll(".i-tab").forEach(function(t){t.classList.remove("active");});
    el.classList.add("active"); DB[p+"Tab"]=tab;
    var f=DB.getF();
    if(section==="own")DB.renderOwnTable(DB.filterR(DB.ownRows,f),f);
    else DB.renderBizTable(DB.filterR(DB.bizRows,f),f);
  },

  renderOwnTable:function(rows,f){
    var tab=DB.ownTab,el=document.getElementById("ownTable");

    var pc=function(v){var cls=v>=0?"vp":"vn";return'<span class="'+cls+'">'+v.toLocaleString("ko-KR")+'</span>';};
    var html="";

      var map={},order=[];
      rows.forEach(function(r){var k=DB.pKey(r.orderDate,period);if(!map[k]){map[k]={s:0,b:0,p:0,n:0,nos:{}};order.push(k);}map[k].s+=r.sellTotal;map[k].b+=r.buyTotal;map[k].p+=r.profit;map[k].n+=r.netProfit;if(r.orderNo)map[k].nos[r.orderNo]=1;});

      order.forEach(function(k){var v=map[k],nos=Object.keys(v.nos).length,rate=v.s>0?(v.p/v.s*100).toFixed(1)+"%":"-";html+='<tr><td>'+k+'</td><td class="td-r">'+fmt(v.s)+'</td><td class="td-r">'+fmt(v.b)+'</td><td class="td-r">'+pc(v.p)+'</td><td class="td-r">'+pc(v.n)+'</td><td class="td-c">'+rate+'</td><td class="td-c">'+nos+'</td></tr>';});
      html+='</tbody></table></div>';
    }else if(tab==="vendor"){
      var map={},order=[];
      rows.forEach(function(r){var k=r.vendor||"(없음)";if(!map[k]){map[k]={s:0,b:0,p:0,n:0,nos:{}};order.push(k);}map[k].s+=r.sellTotal;map[k].b+=r.buyTotal;map[k].p+=r.profit;map[k].n+=r.netProfit;if(r.orderNo)map[k].nos[r.orderNo]=1;});
      order.sort(function(a,b){return map[b].s-map[a].s;});
      html='<div class="table-wrap"><table><thead><tr><th>거래처</th><th>매출</th><th>매입</th><th>이익</th><th>실이익</th><th>이익률</th><th>주문건수</th></tr></thead><tbody>';
      order.forEach(function(k){var v=map[k],nos=Object.keys(v.nos).length,rate=v.s>0?(v.p/v.s*100).toFixed(1)+"%":"-";html+='<tr><td>'+k+'</td><td class="td-r">'+fmt(v.s)+'</td><td class="td-r">'+fmt(v.b)+'</td><td class="td-r">'+pc(v.p)+'</td><td class="td-r">'+pc(v.n)+'</td><td class="td-c">'+rate+'</td><td class="td-c">'+nos+'</td></tr>';});
      html+='</tbody></table></div>';
    }else if(tab==="product"){
      var map={},order=[];
      rows.forEach(function(r){var k=r.product||"(없음)";if(!map[k]){map[k]={s:0,b:0,p:0,n:0,q:0};order.push(k);}map[k].s+=r.sellTotal;map[k].b+=r.buyTotal;map[k].p+=r.profit;map[k].n+=r.netProfit;map[k].q+=r.qty;});
      order.sort(function(a,b){return map[b].s-map[a].s;});
      html='<div class="table-wrap"><table><thead><tr><th>제품명</th><th>수량</th><th>매출</th><th>매입</th><th>이익</th><th>실이익</th><th>이익률</th></tr></thead><tbody>';
      order.forEach(function(k){var v=map[k],rate=v.s>0?(v.p/v.s*100).toFixed(1)+"%":"-";html+='<tr><td>'+k+'</td><td class="td-c">'+v.q+'</td><td class="td-r">'+fmt(v.s)+'</td><td class="td-r">'+fmt(v.b)+'</td><td class="td-r">'+pc(v.p)+'</td><td class="td-r">'+pc(v.n)+'</td><td class="td-c">'+rate+'</td></tr>';});

      if(rows.length>500)html+='<tr><td colspan="14" style="text-align:center;padding:10px;color:#9ca3af;font-size:11px">상위 500건 / 전체 '+rows.length+'건</td></tr>';
      html+='</tbody></table></div>';
    }
    el.innerHTML=html;
  },

      order.sort(function(a,b){return map[b].s-map[a].s;});
      html='<div class="table-wrap"><table><thead><tr><th>부서</th><th>매출</th><th>수수료</th><th>주문건수</th></tr></thead><tbody>';
      order.forEach(function(k){var v=map[k],nos=Object.keys(v.nos).length;html+='<tr><td>'+k+'</td><td class="td-r">'+fmt(v.s)+'</td><td class="td-r">'+fmt(v.fee)+'</td><td class="td-c">'+nos+'</td></tr>';});
      html+='</tbody></table></div>';
    }else if(tab==="product"){
      var map={},order=[];
      rows.forEach(function(r){var k=r.product||"(없음)";if(!map[k]){map[k]={s:0,fee:0,q:0};order.push(k);}map[k].s+=r.sellTotal;map[k].fee+=r.fee;map[k].q+=r.qty;});
      order.sort(function(a,b){return map[b].s-map[a].s;});
      html='<div class="table-wrap"><table><thead><tr><th>제품명</th><th>수량</th><th>매출</th><th>수수료</th></tr></thead><tbody>';
      order.forEach(function(k){var v=map[k];html+='<tr><td>'+k+'</td><td class="td-c">'+v.q+'</td><td class="td-r">'+fmt(v.s)+'</td><td class="td-r">'+fmt(v.fee)+'</td></tr>';});
      html+='</tbody></table></div>';
    }else{
      var fd=function(d){if(!d)return"-";return d.getFullYear()+"-"+(d.getMonth()+1<10?"0":""+(d.getMonth()+1))+"-"+(d.getDate()<10?"0":"")+d.getDate();};
      html='<div class="raw-wrap"><table><thead><tr><th>주문일자</th><th>부서</th><th>회사명</th><th>주문번호</th><th>제품명</th><th>수량</th><th>판매단가</th><th>판매총액</th><th>수수료</th><th>결제방식</th><th>비고</th></tr></thead><tbody>';
      rows.slice(0,500).forEach(function(r){html+='<tr><td>'+fd(r.orderDate)+'</td><td>'+r.dept+'</td><td>'+r.company+'</td><td>'+r.orderNo+'</td><td>'+r.product+'</td><td class="td-c">'+r.qty+'</td><td class="td-r">'+r.sellUnit.toLocaleString("ko-KR")+'</td><td class="td-r">'+r.sellTotal.toLocaleString("ko-KR")+'</td><td class="td-r">'+r.fee.toLocaleString("ko-KR")+'</td><td>'+r.payType+'</td><td>'+r.note+'</td></tr>';});
      if(rows.length>500)html+='<tr><td colspan="11" style="text-align:center;padding:10px;color:#9ca3af;font-size:11px">상위 500건 / 전체 '+rows.length+'건</td></tr>';
      html+='</tbody></table></div>';
    }
    el.innerHTML=html;
  },

  flash:function(id){var el=document.getElementById(id);el.classList.add("show");setTimeout(function(){el.classList.remove("show");},1800);},
  toast:function(msg){var t=document.getElementById("toast");t.textContent=msg;t.style.display="block";setTimeout(function(){t.style.display="none";},2800);}
};
</script>
</body>
</html>
