<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디지털존 단가 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f5f6fa;color:#1a1a2e;font-size:13px}

/* ── 로그인 ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:#fff;border-radius:16px;padding:48px 40px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08);min-width:320px}
.login-card h1{font-size:20px;font-weight:600;margin-bottom:6px}
.login-card p{font-size:13px;color:#6b7280;margin-bottom:32px}
.google-btn{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px 20px;font-size:14px;font-weight:500;color:#374151;cursor:pointer;width:100%;justify-content:center;transition:background .15s}
.google-btn:hover{background:#f9fafb}
.google-btn svg{width:20px;height:20px;flex-shrink:0}

/* ── 앱 ── */
#app{display:none;flex-direction:column;height:100vh;overflow:hidden}
header{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:100}
.logo{font-size:15px;font-weight:600}
.logo span{color:#4359FF}
.hdr-space{flex:1}
.user-info{display:flex;align-items:center;gap:8px;font-size:12px;color:#6b7280}
.avatar{width:28px;height:28px;border-radius:50%;background:#4359FF;color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center}
.logout-btn{font-size:12px;color:#6b7280;background:none;border:1px solid #e5e7eb;border-radius:6px;padding:4px 10px;cursor:pointer}
.logout-btn:hover{background:#f9fafb}

/* ── 컨텐츠 영역 (스크롤) ── */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 20px}

/* ── 툴바 ── */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar-title{font-size:15px;font-weight:600}
.save-badge{font-size:11px;color:#16a34a;opacity:0;transition:opacity .4s}
.save-badge.show{opacity:1}
.spacer{flex:1}
.btn{font-size:12px;padding:6px 12px;border-radius:7px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;color:#374151;font-family:inherit;white-space:nowrap;transition:background .12s}
.btn:hover{background:#f9fafb;border-color:#d1d5db}
.btn-primary{background:#4359FF;color:#fff;border-color:#4359FF}
.btn-primary:hover{background:#3448e0}
.btn-danger{color:#dc2626}
.btn-danger:hover{background:#fef2f2;border-color:#fca5a5}
.btn-sm{font-size:11px;padding:3px 8px}

/* ── 검색 ── */
.search-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.search-wrap{position:relative;flex:1;max-width:420px}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:#fff;transition:border-color .15s}
.search-wrap input:focus{border-color:#4359FF}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:#9ca3af;fill:none;pointer-events:none}
.search-count{font-size:12px;color:#9ca3af}

/* ── 붙여넣기 패널 ── */
.import-panel{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px;margin-bottom:12px;display:none}
.import-panel.open{display:block}
.import-panel h4{font-size:13px;font-weight:600;margin-bottom:6px}
.import-panel p{font-size:11px;color:#6b7280;line-height:1.7;margin-bottom:10px}
.import-panel code{background:#f3f4f6;padding:1px 5px;border-radius:4px;font-size:10px}
textarea{width:100%;height:90px;font-size:11px;font-family:monospace;padding:8px;border-radius:7px;border:1px solid #e5e7eb;resize:vertical;outline:none}
textarea:focus{border-color:#4359FF}

/* ── 테이블 컨테이너 ── */
.table-outer{border-radius:12px;border:1px solid #e5e7eb;background:#fff;overflow:hidden}
.table-scroll{overflow-x:auto;overflow-y:visible}

table{border-collapse:collapse;width:100%;min-width:900px}

/* ── 헤더 (sticky: top=0 기준은 .content 스크롤 기준 → 별도 sticky header div) ── */
.sticky-header{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid #e5e7eb}
.sticky-header table{border-bottom:none}
.sh-row{display:flex;background:#f9fafb;border-bottom:2px solid #e5e7eb}
.sh-cell{display:flex;align-items:center;justify-content:center;padding:0 8px;height:40px;font-size:11px;font-weight:500;color:#6b7280;white-space:nowrap;flex-shrink:0;text-align:center;border-right:1px solid #e5e7eb}
.sh-cell:last-child{border-right:none}
.sh-cell.sh-buy{background:#eff6ff;color:#1d4ed8;border-left:2px solid #bfdbfe}
.sh-cell.sh-card{background:#f0fdf4;color:#15803d;border-left:2px solid #bbf7d0}
.sh-cell.sh-cash{background:#fffbeb;color:#b45309;border-left:2px solid #fde68a}
.sh-cell.sh-l{justify-content:flex-start}
.sh-sub{font-size:9px;display:block;opacity:.7;font-weight:400;line-height:1}

/* ── 컬럼 너비 정의 ── */
:root{
  --w-vendor: 90px;
  --w-code:   105px;
  --w-cycle:  62px;
  --w-price:  95px;  /* 모든 금액 열 동일 */
  --w-pct:    72px;  /* 마진/실이익 열 동일 */
  --w-del:    36px;
}

/* ── 그룹 헤더 행 ── */
.grp-hdr-row{
  display:flex;align-items:center;
  background:#f0f4ff;
  border-top:2px solid #c7d2fe;
  border-bottom:1px solid #dbe4ff;
  min-height:36px;padding:0;
  cursor:default;
}
.grp-hdr-name{
  flex:0 0 calc(var(--w-vendor) + var(--w-code) + var(--w-cycle));
  padding:0 12px;
  font-size:12px;font-weight:600;color:#1a1a2e;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:flex;align-items:center;gap:6px;
}
.grp-hdr-name a{color:#4359FF;text-decoration:none;font-weight:600}
.grp-hdr-name a:hover{text-decoration:underline}
.grp-summary{display:flex;align-items:center;flex:1;gap:0}
.grp-sum-cell{
  flex:0 0 var(--w-price);
  text-align:right;padding:0 8px;
  font-size:12px;color:#374151;
  border-left:1px solid #dbe4ff;
  height:36px;display:flex;align-items:center;justify-content:flex-end;
}
.grp-sum-cell.c-card{color:#15803d;font-weight:500}
.grp-sum-cell.c-cash{color:#b45309;font-weight:500}
.grp-sum-cell.c-pct{flex:0 0 var(--w-pct);font-weight:600}
.grp-sum-cell.c-buy{color:#1d4ed8}
.grp-sum-cell.label{font-size:10px;color:#9ca3af;font-weight:400;justify-content:flex-start;padding-left:12px;flex:0 0 60px}
.grp-sum-gap{flex:1}
.grp-cnt{font-size:10px;color:#9ca3af;font-weight:400;margin-left:4px}

/* ── 데이터 행 ── */
.data-row{
  display:flex;align-items:center;
  height:40px;
  border-bottom:1px solid #f3f4f6;
  cursor:pointer;transition:background .1s;
}
.data-row:hover{background:#f5f7ff}
.data-row.selected{background:#eef2ff}
.data-row.selected .sel-dot{background:#4359FF}

/* ── 셀 공통 ── */
.dc{
  flex-shrink:0;height:40px;display:flex;align-items:center;
  border-right:1px solid #f3f4f6;padding:0;
  position:relative;
}
.dc:last-child{border-right:none}
.dc.buy-sep{border-left:2px solid #e0e7ff}
.dc.card-sep{border-left:2px solid #d1fae5}
.dc.cash-sep{border-left:2px solid #fef3c7}

/* 선택 도트 */
.sel-dot{width:6px;height:6px;border-radius:50%;background:#d1d5db;margin:0 8px;flex-shrink:0;transition:background .15s}

/* 인라인 입력 */
.ci{width:100%;height:100%;border:none;background:transparent;font-size:12px;color:#1a1a2e;font-family:inherit;outline:none;padding:0 8px;text-align:center}
.ci-l{text-align:left}
.ci-r{text-align:right;padding-right:8px}
.ci:focus{background:#dbeafe}
.ci::placeholder{color:#e5e7eb}

/* ERP 토글 */
.erp-wrap{display:flex;align-items:center;height:100%;width:100%;padding:0 4px;gap:2px}
.erp-toggle{font-size:10px;color:#9ca3af;cursor:pointer;padding:2px 4px;border-radius:3px;border:1px solid #e5e7eb;background:#f9fafb;white-space:nowrap;flex-shrink:0}
.erp-toggle:hover{background:#f3f4f6}
.erp-val{font-size:11px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;padding:0 2px}

/* 마진 색상 */
.c-pos{color:#16a34a;font-weight:600;justify-content:flex-end;padding-right:8px;font-size:12px}
.c-neg{color:#dc2626;font-weight:600;justify-content:flex-end;padding-right:8px;font-size:12px}
.c-neu{color:#6b7280;justify-content:flex-end;padding-right:8px;font-size:12px}
.c-none{color:#d1d5db;justify-content:center;font-size:12px}

/* 삭제 */
.del-btn{background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px;padding:4px;opacity:0;font-family:inherit;width:100%;text-align:center}
.data-row:hover .del-btn{opacity:.7}
.del-btn:hover{opacity:1 !important}

/* 결제주기 일괄 */
.cycle-bulk{font-size:10px;color:#9ca3af;cursor:pointer;padding:1px 4px;border-radius:3px;border:1px solid #e5e7eb;background:#f9fafb;margin-left:2px;flex-shrink:0}
.cycle-bulk:hover{background:#f3f4f6;color:#4359FF}

/* 빈/로딩 */
.empty-msg{text-align:center;padding:48px;color:#9ca3af;font-size:13px}
#loading{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;font-size:13px;color:#6b7280}
.spinner{width:28px;height:28px;border:3px solid #e5e7eb;border-top-color:#4359FF;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;font-size:12px;padding:8px 20px;border-radius:8px;display:none;z-index:999}

mark.hl{background:#fef08a;border-radius:2px;padding:0}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><span>불러오는 중...</span></div>
<div id="toast"></div>

<div id="loginScreen">
  <div class="login-card">
    <h1>디지털존 단가 관리</h1>
    <p>구글 계정으로 로그인하여 사용하세요</p>
    <button class="google-btn" onclick="signIn()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google로 로그인
    </button>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">디지털존 <span>단가관리</span></div>
    <div class="hdr-space"></div>
    <div class="user-info">
      <div class="avatar" id="avatarInitial">?</div>
      <span id="userEmail"></span>
      <button class="logout-btn" onclick="signOut()">로그아웃</button>
    </div>
  </header>

  <div class="content">
    <div class="toolbar">
      <span class="toolbar-title">단가 목록</span>
      <span class="save-badge" id="saveBadge">저장됨 ✓</span>
      <div class="spacer"></div>
      <label style="font-size:11px;color:#6b7280;display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none">
        <input type="checkbox" id="chkVat" onchange="toggleVat()" style="accent-color:#4359FF;cursor:pointer"> VAT+ 보기
      </label>
      <button class="btn btn-primary" onclick="addRow()">+ 행 추가</button>
      <button class="btn" onclick="addVendorRow()">+ 거래처 추가</button>
      <button class="btn" onclick="toggleImport()">엑셀 붙여넣기</button>
      <button class="btn btn-danger" onclick="clearAll()">전체 초기화</button>
    </div>

    <div class="search-row">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/></svg>
        <input type="text" id="searchInput" placeholder="제품코드, 품목명, 공급처 검색..." oninput="onSearch()">
      </div>
      <span class="search-count" id="searchCount"></span>
    </div>

    <div class="import-panel" id="importPanel">
      <h4>엑셀 데이터 붙여넣기</h4>
      <p>열 순서: <code>공급처</code> <code>디지털존코드</code> <code>ERP코드</code> <code>품목명</code> <code>결제주기</code> <code>매입가(VAT-)</code> <code>카드판매가(VAT-)</code> <code>현금판매가(VAT-)</code></p>
      <textarea id="pasteArea" placeholder="여기에 붙여넣기..."></textarea>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-primary" onclick="importData()">가져오기</button>
        <button class="btn" onclick="toggleImport()">취소</button>
      </div>
    </div>

    <!-- sticky 헤더 -->
    <div class="table-outer">
      <div id="stickyHdr" class="sticky-header"></div>
      <div id="tableBody"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc }
  from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyCbjHxYjPKd5HqSylP5lvls1GHdcylK1XU",
  authDomain:        "authentication-7ee4e.firebaseapp.com",
  projectId:         "authentication-7ee4e",
  storageBucket:     "authentication-7ee4e.firebasestorage.app",
  messagingSenderId: "349583834213",
  appId:             "1:349583834213:web:9c2bf9251a87f1ef3ada8c"
};
const ALLOWED_EMAIL = "emtlstodn@gmail.com";

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

let rows      = [];
let showVat   = false;
let uid       = null;
let searchQ   = "";
let selectedMap = {}; // dzCode → rowId (선택된 거래처)
let erpShown  = {}; // dzCode → bool

// ── 인증 ──────────────────────────────
window.signIn = async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e) { toast("로그인 실패: " + e.message); }
};
window.signOut = async () => { await fbSignOut(auth); location.reload(); };

onAuthStateChanged(auth, async user => {
  hide("loading");
  if (!user) { show("loginScreen"); return; }
  if (user.email !== ALLOWED_EMAIL) {
    toast("접근 권한이 없습니다."); await fbSignOut(auth); show("loginScreen"); return;
  }
  uid = user.uid;
  document.getElementById("avatarInitial").textContent = user.email[0].toUpperCase();
  document.getElementById("userEmail").textContent = user.email;
  hide("loginScreen"); show("app");
  await loadData();
  buildHeader();
  renderAll();
});

// ── Firestore ─────────────────────────
async function loadData() {
  try {
    const snap = await getDoc(doc(db, "priceData", uid));
    if (snap.exists()) {
      const d = snap.data();
      rows       = d.rows        || [];
      showVat    = d.showVat     || false;
      selectedMap= d.selectedMap || {};
      document.getElementById("chkVat").checked = showVat;
    }
  } catch(e) { toast("불러오기 실패: " + e.message); }
}
async function saveData() {
  try {
    await setDoc(doc(db, "priceData", uid),
      { rows, showVat, selectedMap, updatedAt: new Date().toISOString() });
    flash("saveBadge");
  } catch(e) { toast("저장 실패: " + e.message); }
}

// ── 계산 ──────────────────────────────
function calc(r) {
  const bEx=+r.buyEx||0, cEx=+r.cardSellEx||0, hEx=+r.cashSellEx||0;
  const bInc=Math.round(bEx*1.1), cInc=Math.round(cEx*1.1), hInc=Math.round(hEx*1.1);
  const cMg = cEx>0 ? (cEx-bEx)/cEx*100 : null;
  const cPf = cMg!==null ? cMg-2.64 : null;
  const hMg = hEx>0 ? (hEx-bEx)/hEx*100 : null;
  const hPf = hInc>0 ? (hInc-bInc-330)/hInc*100 : null;
  return {bEx,cEx,hEx,bInc,cInc,hInc,cMg,cPf,hMg,hPf};
}

// ── CRUD ──────────────────────────────
function newId() { return Math.random().toString(36).slice(2,9); }

window.addRow = (def={}) => {
  const r = {id:newId(),vendor:"",dzCode:"",erpCode:"",name:"",cycle:"",buyEx:"",cardSellEx:"",cashSellEx:"",...def};
  rows.push(r);
  renderAll(); saveData();
};
window.addVendorRow = () => {
  const last = rows[rows.length-1];
  window.addRow(last?{dzCode:last.dzCode,erpCode:last.erpCode,name:last.name}:{});
};
window.deleteRow = id => {
  if(!confirm("이 행을 삭제할까요?")) return;
  rows = rows.filter(r=>r.id!==id);
  renderAll(); saveData();
};
window.updateField = (id, field, rawVal) => {
  const r = rows.find(r=>r.id===id);
  if(!r) return;
  r[field] = ['buyEx','cardSellEx','cashSellEx'].includes(field)
    ? rawVal.replace(/,/g,"") : rawVal;
  renderAll();
};
window.saveBlur = () => saveData();

window.selectRow = (dzCode, rowId) => {
  selectedMap[dzCode] = rowId;
  renderAll(); saveData();
};

window.bulkCycle = (dzCode) => {
  const val = prompt("이 제품 전체 결제주기 일괄 입력 (예: +8일)");
  if(val===null) return;
  rows.forEach(r=>{ if(r.dzCode===dzCode) r.cycle=val; });
  renderAll(); saveData();
};

window.toggleErp = (dzCode) => {
  erpShown[dzCode] = !erpShown[dzCode];
  renderAll();
};

window.clearAll = () => {
  if(!confirm("전체 초기화할까요?")) return;
  rows=[]; selectedMap={}; renderAll(); saveData();
};
window.toggleVat = () => {
  showVat = document.getElementById("chkVat").checked;
  buildHeader(); renderAll(); saveData();
};
window.toggleImport = () => document.getElementById("importPanel").classList.toggle("open");
window.onSearch = () => { searchQ=document.getElementById("searchInput").value.toLowerCase().trim(); renderAll(); };

window.importData = () => {
  const raw = document.getElementById("pasteArea").value.trim();
  if(!raw) return;
  const n = s => { const v=parseFloat((s||"").replace(/,/g,"").replace(/원/g,"")); return isNaN(v)?"":v; };
  let added=0;
  raw.split("\n").filter(l=>l.trim()).forEach(line=>{
    const c=line.split("\t").map(s=>s.trim());
    if(c.length<3) return;
    rows.push({id:newId(),
      vendor:c[0]||"", dzCode:c[1]||"", erpCode:c[2]||"", name:c[3]||"", cycle:c[4]||"",
      buyEx:n(c[5]), cardSellEx:n(c[6]), cashSellEx:n(c[7])});
    added++;
  });
  renderAll(); saveData();
  document.getElementById("pasteArea").value="";
  document.getElementById("importPanel").classList.remove("open");
  toast(`${added}개 행을 가져왔습니다`);
};

// ── 열 너비 ──────────────────────────
function W() {
  const v=showVat;
  const P="95px", PCT="72px";
  // [공급처, 코드, 결제주기, 매입, 매입+, 카드, 카드+, 카드마진, 카드실이익, 현금, 현금+, 현금마진, 현금실이익, 삭제]
  return [
    "90px","105px","62px",
    P, ...(v?[P]:[]),
    P, ...(v?[P]:[]), PCT, PCT,
    P, ...(v?[P]:[]), PCT, PCT,
    "36px"
  ];
}

// ── 헤더 (flex 방식 → sticky 완벽 동작) ──
function buildHeader() {
  const v=showVat; const P="95px"; const PCT="72px";
  const cells = [
    {l:"공급처",         w:"90px"},
    {l:"제품코드",       w:"105px"},
    {l:"결제주기",       w:"62px"},
    {l:"<span class='sh-sub'>매입가</span>VAT-", w:P, cls:"sh-buy"},
    ...(v?[{l:"<span class='sh-sub'>매입가</span>VAT+",w:P,cls:"sh-buy"}]:[]),
    {l:"<span class='sh-sub'>카드</span>VAT-",   w:P,   cls:"sh-card"},
    ...(v?[{l:"<span class='sh-sub'>카드</span>VAT+",w:P,cls:"sh-card"}]:[]),
    {l:"<span class='sh-sub'>카드</span>마진율", w:PCT, cls:"sh-card"},
    {l:"<span class='sh-sub'>카드</span>실이익", w:PCT, cls:"sh-card"},
    {l:"<span class='sh-sub'>현금</span>VAT-",   w:P,   cls:"sh-cash"},
    ...(v?[{l:"<span class='sh-sub'>현금</span>VAT+",w:P,cls:"sh-cash"}]:[]),
    {l:"<span class='sh-sub'>현금</span>마진율", w:PCT, cls:"sh-cash"},
    {l:"<span class='sh-sub'>현금</span>실이익", w:PCT, cls:"sh-cash"},
    {l:"", w:"36px"},
  ];
  document.getElementById("stickyHdr").innerHTML =
    `<div class="sh-row">${cells.map(c=>`<div class="sh-cell ${c.cls||''}" style="width:${c.w};flex:0 0 ${c.w}">${c.l}</div>`).join("")}</div>`;
}

// ── 렌더 ──────────────────────────────
function renderAll() {
  const v=showVat; const q=searchQ;
  const P="95px"; const PCT="72px";

  const filtered = q
    ? rows.filter(r=>(r.dzCode||"").toLowerCase().includes(q)||(r.name||"").toLowerCase().includes(q)||(r.vendor||"").toLowerCase().includes(q))
    : rows;

  document.getElementById("searchCount").textContent =
    q ? `${filtered.length} / ${rows.length}건` : `총 ${rows.length}건`;

  if(!filtered.length){
    document.getElementById("tableBody").innerHTML=`<div class="empty-msg">${q?"검색 결과가 없습니다":"행을 추가하거나 엑셀에서 붙여넣기 하세요"}</div>`;
    return;
  }

  // 그룹핑
  const codeOrder=[], codeMap={};
  filtered.forEach(r=>{
    const k=r.dzCode||("__"+r.id);
    if(!codeMap[k]){codeMap[k]=[]; codeOrder.push(k);}
    codeMap[k].push(r);
  });

  const fmt = v => (v!==null&&v!==undefined&&v!=="")?Number(v).toLocaleString("ko-KR"):"";
  const fmtK = v => v>0?v.toLocaleString("ko-KR"):"-";
  const pCell = (val,cls="") => {
    if(val===null) return `<div class="dc c-none ${cls}" style="width:${PCT};flex:0 0 ${PCT}">-</div>`;
    const cc=val>1?"c-pos":val<0?"c-neg":"c-neu";
    return `<div class="dc ${cc} ${cls}" style="width:${PCT};flex:0 0 ${PCT}">${val.toFixed(2)}%</div>`;
  };

  let html="";

  codeOrder.forEach(k=>{
    const grp=codeMap[k];
    const rep=grp[0];
    const isGrp=grp.length>1;
    const url=rep.dzCode?`https://www.digitalzone.co.kr/products/${esc(rep.dzCode)}`:null;
    const showErp=erpShown[k];

    // 선택된 거래처 결정
    if(!selectedMap[k] || !grp.find(r=>r.id===selectedMap[k])) {
      selectedMap[k]=grp[0].id;
    }
    const selRow = grp.find(r=>r.id===selectedMap[k]) || grp[0];
    const sc = calc(selRow);

    // 그룹 헤더 요약 (공급가, 카드가, 현금가, 카드실이익, 현금실이익)
    const summaryRight = `
      <div class="grp-sum-cell c-buy">${sc.bEx?fmtK(sc.bEx):"-"}</div>
      <div class="grp-sum-cell c-card">${sc.cEx?fmtK(sc.cEx):"-"}</div>
      ${sc.cPf!==null?`<div class="grp-sum-cell c-pct c-card">${sc.cPf.toFixed(2)}%</div>`:`<div class="grp-sum-cell c-pct" style="color:#d1d5db">-</div>`}
      <div class="grp-sum-cell c-cash">${sc.hEx?fmtK(sc.hEx):"-"}</div>
      ${sc.hPf!==null?`<div class="grp-sum-cell c-pct c-cash">${sc.hPf.toFixed(2)}%</div>`:`<div class="grp-sum-cell c-pct" style="color:#d1d5db">-</div>`}
      <div class="grp-sum-gap"></div>
    `;

    html+=`<div class="grp-hdr-row">
      <div class="grp-hdr-name" style="flex:0 0 calc(90px + 105px + 62px)">
        ${url
          ? `<a href="${url}" target="_blank">${esc(rep.name)||"(품목명 없음)"}</a>`
          : `<span>${esc(rep.name)||"(품목명 없음)"}</span>`
        }
        ${isGrp?`<span class="grp-cnt">${grp.length}개 거래처</span>`:""}
      </div>
      <div class="grp-summary">
        <div class="grp-sum-cell label">선택가</div>
        ${summaryRight}
      </div>
    </div>`;

    // 데이터 행
    grp.forEach(r=>{
      const c=calc(r);
      const isSel = selectedMap[k]===r.id;

      html+=`<div class="data-row ${isSel?"selected":""}" onclick="selectRow('${esc(k)}','${r.id}')">
        <div class="sel-dot"></div>
        <div class="dc" style="width:calc(90px - 22px);flex:0 0 calc(90px - 22px)">
          <input class="ci ci-l" value="${esc(r.vendor)}"
            onclick="event.stopPropagation()"
            onchange="updateField('${r.id}','vendor',this.value)" onblur="saveBlur()" placeholder="공급처">
        </div>
        <div class="dc" style="width:${P==="95px"?"105px":"105px"};flex:0 0 105px">
          <div class="erp-wrap">
            <input class="ci" style="font-size:11px;color:#6b7280" value="${esc(r.dzCode)}"
              onclick="event.stopPropagation()"
              onchange="updateField('${r.id}','dzCode',this.value)" onblur="saveBlur()" placeholder="제품코드">
          </div>
        </div>
        <div class="dc" style="width:62px;flex:0 0 62px">
          <input class="ci" style="font-size:11px" value="${esc(r.cycle)}"
            onclick="event.stopPropagation()"
            onchange="updateField('${r.id}','cycle',this.value)" onblur="saveBlur()" placeholder="+N일">
          ${isGrp?`<button class="cycle-bulk" onclick="event.stopPropagation();bulkCycle('${esc(k)}')" title="전체 일괄">↕</button>`:""}
        </div>

        <div class="dc buy-sep" style="width:${P};flex:0 0 ${P}">
          <input class="ci ci-r" value="${fmt(r.buyEx)}"
            onclick="event.stopPropagation()"
            onfocus="this.value='${r.buyEx||''}'"
            onblur="updateField('${r.id}','buyEx',this.value);saveBlur();this.value=this.value?Number(this.value.replace(/,/g,'')).toLocaleString('ko-KR'):''"
            placeholder="0">
        </div>
        ${v?`<div class="dc" style="width:${P};flex:0 0 ${P};justify-content:flex-end;padding-right:8px;font-size:12px;color:#9ca3af">${fmtK(c.bInc)}</div>`:""}

        <div class="dc card-sep" style="width:${P};flex:0 0 ${P}">
          <input class="ci ci-r" value="${fmt(r.cardSellEx)}"
            onclick="event.stopPropagation()"
            onfocus="this.value='${r.cardSellEx||''}'"
            onblur="updateField('${r.id}','cardSellEx',this.value);saveBlur();this.value=this.value?Number(this.value.replace(/,/g,'')).toLocaleString('ko-KR'):''"
            placeholder="0">
        </div>
        ${v?`<div class="dc" style="width:${P};flex:0 0 ${P};justify-content:flex-end;padding-right:8px;font-size:12px;color:#9ca3af">${fmtK(c.cInc)}</div>`:""}
        ${pCell(c.cMg)}
        ${pCell(c.cPf)}

        <div class="dc cash-sep" style="width:${P};flex:0 0 ${P}">
          <input class="ci ci-r" value="${fmt(r.cashSellEx)}"
            onclick="event.stopPropagation()"
            onfocus="this.value='${r.cashSellEx||''}'"
            onblur="updateField('${r.id}','cashSellEx',this.value);saveBlur();this.value=this.value?Number(this.value.replace(/,/g,'')).toLocaleString('ko-KR'):''"
            placeholder="0">
        </div>
        ${v?`<div class="dc" style="width:${P};flex:0 0 ${P};justify-content:flex-end;padding-right:8px;font-size:12px;color:#9ca3af">${fmtK(c.hInc)}</div>`:""}
        ${pCell(c.hMg)}
        ${pCell(c.hPf)}

        <div class="dc" style="width:36px;flex:0 0 36px">
          <button class="del-btn" onclick="event.stopPropagation();deleteRow('${r.id}')">✕</button>
        </div>
      </div>`;
    });
  });

  document.getElementById("tableBody").innerHTML=html;
}

// ── 유틸 ──────────────────────────────
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/'/g,"&#39;"); }
function show(id){ const el=document.getElementById(id); if(el) el.style.display=id==="app"?"flex":"block"; }
function hide(id){ const el=document.getElementById(id); if(el) el.style.display="none"; }
function flash(id){ const el=document.getElementById(id); el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),1800); }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.style.display="block"; setTimeout(()=>t.style.display="none",2800); }
</script>
